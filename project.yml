name: ClawdBar
options:
  bundleIdPrefix: com.rossnicholson
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "26.0"

settings:
  base:
    PRODUCT_NAME: ClawdBar
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES

targets:
  ClawdBar:
    type: application
    platform: macOS
    sources:
      - path: ClawdBar
    info:
      path: ClawdBar/Info.plist
      properties:
        CFBundleDisplayName: ClawdBar
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSUIElement: true
        NSHighResolutionCapable: true
        LSMinimumSystemVersion: "13.0"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rossnicholson.ClawdBar
        CODE_SIGN_ENTITLEMENTS: ClawdBar/ClawdBar.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_STYLE: Manual
          CODE_SIGN_IDENTITY: "Developer ID Application"
          DEVELOPMENT_TEAM: "5HQ5V9NP82"
          ENABLE_HARDENED_RUNTIME: YES
